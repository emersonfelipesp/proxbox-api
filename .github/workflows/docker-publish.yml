name: Docker publish

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Tag or ref to publish from
        required: true
        default: v0.0.3

permissions:
  contents: read

jobs:
  docker-publish:
    name: publish Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref }}

      - name: Validate release version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          release_ref = os.environ["RELEASE_REF"].strip()
          version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          expected_tag = f"v{version}"
          if release_ref.startswith("v") and release_ref != expected_tag:
              raise SystemExit(
                  f"release_ref/version mismatch: ref={release_ref!r}, "
                  f"expected {expected_tag!r}"
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tag={version}\n")
          PY
        env:
          RELEASE_REF: ${{ inputs.release_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: emersonfelipesp/proxbox-api
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
