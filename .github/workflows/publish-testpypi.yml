name: Release validation and publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-release:
    name: prepare artifacts + metadata
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate package metadata and tag
        id: meta
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))
          project_name = data['project']['name']
          version = data['project']['version']
          tag = os.getenv('GITHUB_REF_NAME', '')
          event = os.getenv('GITHUB_EVENT_NAME', '')
          if project_name != 'proxbox_api':
              raise SystemExit(f'Expected project name proxbox_api, got {project_name!r}')
          if event == 'push' and tag and tag != f'v{version}':
              raise SystemExit(f'Tag/version mismatch: tag={tag!r}, version={version!r}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'package_name={project_name}\nversion={version}\n')
          PY

      - name: Build distribution
        run: uv run --with build python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: publish to TestPyPI
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload to TestPyPI
        env:
          TEST_PYPI_USERNAME: ${{ secrets.TEST_PYPI_USERNAME }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          uv run --with twine python -m twine upload \
            --non-interactive \
            --skip-existing \
            --repository-url https://test.pypi.org/legacy/ \
            --username "$TEST_PYPI_USERNAME" \
            --password "$TEST_PYPI_TOKEN" \
            dist/*

  validate-testpypi:
    name: validate TestPyPI / py${{ matrix.python-version }}
    needs: [prepare-release, publish-testpypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync development environment
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests

  publish-pypi:
    name: publish to PyPI
    if: github.event_name == 'push'
    needs: [prepare-release, validate-testpypi]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload to PyPI
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv run --with twine python -m twine upload \
            --non-interactive \
            --skip-existing \
            --repository-url https://upload.pypi.org/legacy/ \
            --username "$PYPI_USERNAME" \
            --password "$PYPI_TOKEN" \
            dist/*

  docker-publish:
    name: publish Docker image to Docker Hub
    if: github.event_name == 'push'
    needs: [prepare-release, validate-testpypi]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          # Strip leading 'v' if present (should not be, but ensure)
          TAG="${VERSION#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract metadata (labels, etc.)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: emersonfelipesp/proxbox-api
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
