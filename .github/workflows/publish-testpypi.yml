name: Release validation and publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Package index to publish to. Tag pushes use TestPyPI except rc tags; releases use PyPI."
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
      source_ref:
        description: "Version tag to publish, for example v0.0.15 or v0.0.15rc1. Empty uses the workflow ref."
        required: false
        type: string
        default: ""
      expected_version:
        description: "Optional guard without the leading v, for example 0.0.15."
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  PROXBOX_ENCRYPTION_KEY: proxbox-ci-only-encryption-key-not-a-secret
  PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"

jobs:
  prepare-release:
    name: prepare artifacts + metadata
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      publish_target: ${{ steps.meta.outputs.publish_target }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      netbox_versions: ${{ steps.meta.outputs.netbox_versions }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || (github.event_name == 'release' && github.event.release.tag_name || github.ref) }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate package metadata and tag
        id: meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PUBLISH_TARGET_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target || '' }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          SOURCE_REF_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || '' }}
          EXPECTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_version || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import tomllib

          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))
          lock_data = tomllib.loads(pathlib.Path('uv.lock').read_text(encoding='utf-8'))
          netbox_versions = json.loads(
              pathlib.Path('.github/netbox-versions.json').read_text(encoding='utf-8')
          )
          project_name = data['project']['name']
          version = data['project']['version']
          normalized_name = project_name.replace('_', '-')
          lock_version = next(
              (
                  pkg['version']
                  for pkg in lock_data.get('package', [])
                  if pkg.get('name') == normalized_name
              ),
              None,
          )
          event = os.getenv('GITHUB_EVENT_NAME', '')
          expected_version = os.getenv('EXPECTED_VERSION', '') or ''
          release_tag = os.getenv('RELEASE_TAG_NAME', '') or ''
          source_ref = os.getenv('SOURCE_REF_INPUT', '') or ''
          github_ref_name = os.getenv('GITHUB_REF_NAME', '') or ''
          ref_name = release_tag or source_ref or github_ref_name
          if ref_name.startswith('refs/tags/'):
              ref_name = ref_name.removeprefix('refs/tags/')
          if project_name != 'proxbox_api':
              raise SystemExit(f'Expected project name proxbox_api, got {project_name!r}')
          if lock_version != version:
              raise SystemExit(f'uv.lock version mismatch: lock={lock_version!r}, version={version!r}')
          if expected_version and expected_version != version:
              raise SystemExit(f'Expected version {expected_version!r}, got {version!r}')
          expected_tag = f'v{version}'
          if not ref_name.startswith('v'):
              raise SystemExit(f'Release publishing requires a version tag ref, got {ref_name!r}')
          if ref_name != expected_tag:
              raise SystemExit(f'Tag/version mismatch: tag={ref_name!r}, version={version!r}')

          target_input = os.getenv('PUBLISH_TARGET_INPUT', '') or ''
          if target_input:
              publish_target = target_input
          elif event == 'release':
              publish_target = 'pypi'
          elif event == 'push' and re.search(r'rc\d+$', version):
              publish_target = 'pypi'
          else:
              publish_target = 'testpypi'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'package_name={project_name}\n')
              fh.write(f'publish_target={publish_target}\n')
              fh.write(f'tag={expected_tag}\n')
              fh.write(f'version={version}\n')
              fh.write(f'netbox_versions={json.dumps(netbox_versions)}\n')
          PY

      - name: Build distribution
        run: uv run --with build python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: publish to TestPyPI
    if: needs.prepare-release.outputs.publish_target == 'testpypi'
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload to TestPyPI
        env:
          TEST_PYPI_USERNAME: ${{ secrets.TEST_PYPI_USERNAME }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          uv run --with twine python -m twine upload \
            --non-interactive \
            --repository-url https://test.pypi.org/legacy/ \
            --username "$TEST_PYPI_USERNAME" \
            --password "$TEST_PYPI_TOKEN" \
            dist/*

  validate-testpypi:
    name: validate TestPyPI / py${{ matrix.python-version }}
    if: needs.prepare-release.outputs.publish_target == 'testpypi'
    needs: [prepare-release, publish-testpypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || (github.event_name == 'release' && github.event.release.tag_name || github.ref) }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Validate package install from TestPyPI
        env:
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -eux
          uv venv --python "${{ matrix.python-version }}" .package-smoke
          installed=0
          for i in $(seq 1 30); do
            if uv pip install \
              --python .package-smoke/bin/python \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              --index-strategy unsafe-best-match \
              "${PACKAGE_NAME}==${PACKAGE_VERSION}"; then
              installed=1
              break
            fi
            sleep 10
          done
          if [ "$installed" -ne 1 ]; then
            exit 1
          fi
          .package-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata
          import os

          package_name = os.environ["PACKAGE_NAME"]
          package_version = os.environ["PACKAGE_VERSION"]
          installed_version = metadata.version(package_name)
          if installed_version != package_version:
              raise SystemExit(
                  f"Installed {package_name} {installed_version}, expected {package_version}"
              )
          import proxbox_api.main  # noqa: F401
          from proxbox_api.proxmox_to_netbox.proxmox_schema import (
              load_proxmox_generated_openapi,
          )

          assert load_proxmox_generated_openapi().get("paths")
          PY

      - name: Sync development environment
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Ty (type check)
        run: uv run ty check proxbox_api/types proxbox_api/utils/retry.py proxbox_api/schemas/sync.py

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_sdk.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: |
          uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests --ignore=tests/e2e \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_prefers_guest_agent_ip \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_falls_back_to_config_when_guest_agent_unavailable \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_skips_guest_agent_call_when_disabled \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_ignore_ipv6_link_local_false_includes_fe80

  validate-pypi-candidate:
    name: validate PyPI candidate / py${{ matrix.python-version }}
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    needs: [prepare-release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || (github.event_name == 'release' && github.event.release.tag_name || github.ref) }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync development environment
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Ty (type check)
        run: uv run ty check proxbox_api/types proxbox_api/utils/retry.py proxbox_api/schemas/sync.py

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_sdk.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: |
          uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests --ignore=tests/e2e \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_prefers_guest_agent_ip \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_falls_back_to_config_when_guest_agent_unavailable \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_skips_guest_agent_call_when_disabled \
            --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_ignore_ipv6_link_local_false_includes_fe80

  e2e-pre-publish:
    name: E2E pre-publish (dev deps) [${{ matrix.netbox-version }}]
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    runs-on: ubuntu-latest
    needs: [prepare-release]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        netbox-version: ${{ fromJSON(needs.prepare-release.outputs.netbox_versions) }}
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:${{ matrix.netbox-version }}
      PROXMOX_OPENAPI_IMAGE: emersonfelipesp/proxmox-sdk:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || (github.event_name == 'release' && github.event.release.tag_name || github.ref) }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync E2E dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Start E2E stack
        run: |
          set -eux
          docker network create proxbox-e2e || true
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'
          NETBOX_PROXBOX_TARGET='https://github.com/emersonfelipesp/netbox-proxbox/archive/refs/tags/v0.0.15rc11.tar.gz'
          DEV_OVERRIDES='git+https://github.com/emersonfelipesp/netbox-sdk.git@main git+https://github.com/emersonfelipesp/proxmox-sdk.git@main'

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http proxmox-e2e-mock proxbox-e2e 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          docker pull "${PROXMOX_OPENAPI_IMAGE}"
          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p 18006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            "${PROXMOX_OPENAPI_IMAGE}"

          if ! docker pull "${NETBOX_IMAGE}" 2>/dev/null; then
            NETBOX_VERSION="${NETBOX_IMAGE##*:}"
            git clone --depth 1 https://github.com/netbox-community/netbox-docker.git /tmp/netbox-docker
            git clone --depth 1 --branch "${NETBOX_VERSION}" \
              https://github.com/netbox-community/netbox.git /tmp/netbox-docker/.netbox
            docker build \
              --build-arg "FROM=ubuntu:24.04" \
              --build-arg "NETBOX_PATH=.netbox" \
              -t "${NETBOX_IMAGE}" \
              /tmp/netbox-docker
          fi

          docker run -d --name netbox-e2e-http --network proxbox-e2e -p 18080:8000 \
            -e DB_HOST=netbox-e2e-postgres \
            -e DB_WAIT_TIMEOUT=600 \
            -e DB_NAME=netbox \
            -e DB_USER=netbox \
            -e DB_PASSWORD=netbox \
            -e REDIS_HOST=netbox-e2e-redis \
            -e REDIS_DATABASE=0 \
            -e REDIS_CACHE_HOST=netbox-e2e-redis \
            -e REDIS_CACHE_DATABASE=1 \
            -e REDIS_TASK_HOST=netbox-e2e-redis \
            -e REDIS_TASK_DATABASE=2 \
            -e SECRET_KEY="$SECRET_KEY" \
            -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http" \
            -e LOGIN_REQUIRED=False \
            --entrypoint /bin/bash \
            "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir '${NETBOX_PROXBOX_TARGET}' && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && i=0 && until /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py migrate --no-input; do i=\$((i+1)); if [ \$i -ge 120 ]; then echo 'migrate exhausted retries'; exit 1; fi; sleep 2; done && /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"

          docker build --target raw \
            --build-arg "DEV_OVERRIDES=${DEV_OVERRIDES}" \
            -t proxbox-e2e:raw .

          docker run -d --name proxbox-e2e --network proxbox-e2e -p 18081:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            -e PROXBOX_ENCRYPTION_KEY \
            -e PROXBOX_BIND_HOST=0.0.0.0 \
            proxbox-e2e:raw

      - name: Wait for services and verify connectivity
        run: |
          set -eux
          for i in $(seq 1 900); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/ 2>/dev/null || true)"
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ]; then break; fi
            sleep 2
            if [ "$i" -eq 900 ]; then echo "NetBox did not become ready"; docker logs netbox-e2e-http || true; exit 1; fi
          done

          for i in $(seq 1 60); do
            api_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/status/ 2>/dev/null || true)"
            if [ "$api_code" -ge 200 ] 2>/dev/null && [ "$api_code" -lt 400 ]; then break; fi
            sleep 2
            if [ "$i" -eq 60 ]; then echo "NetBox API did not become ready"; docker logs netbox-e2e-http || true; exit 1; fi
          done

          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 http://127.0.0.1:18006/openapi.json >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 60 ]; then echo "proxmox mock did not become ready"; docker logs proxmox-e2e-mock || true; exit 1; fi
          done

          for i in $(seq 1 120); do
            if curl -fsS --max-time 5 http://127.0.0.1:18081/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 120 ]; then echo "proxbox-api did not become ready"; docker logs proxbox-e2e || true; exit 1; fi
          done

          TOKEN_OUTPUT=$(docker exec netbox-e2e-http /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u, _ = User.objects.get_or_create(username='admin', defaults={'email':'admin@example.com'}); u.email='admin@example.com'; u.is_staff=True; u.is_superuser=True; u.set_password('admin'); u.save(); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          NETBOX_API_TOKEN=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          PROXBOX_API_KEY="proxbox-e2e-api-key-proxbox-e2e-api-key-1234567890"
          curl -fsS -X POST http://127.0.0.1:18081/auth/register-key \
            -H "Content-Type: application/json" \
            --data "{\"api_key\":\"${PROXBOX_API_KEY}\",\"label\":\"e2e\"}"
          curl -fsS -X POST http://127.0.0.1:18081/netbox/endpoint \
            -H "Content-Type: application/json" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}" \
            --data "{\"name\":\"e2e-netbox\",\"ip_address\":\"netbox-e2e-http\",\"domain\":\"\",\"port\":8000,\"token_version\":\"v1\",\"token\":\"${NETBOX_API_TOKEN}\",\"verify_ssl\":false}"

          STATUS_JSON=$(curl -sS http://127.0.0.1:18081/netbox/status -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}")
          echo "$STATUS_JSON"
          export STATUS_JSON
          python3 - <<'PY'
          import json, os, sys
          p = json.loads(os.environ["STATUS_JSON"])
          if not (p.get("available") or "netbox-version" in p or "django-version" in p):
              sys.exit(f"NetBox status check failed: {p}")
          PY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker logs netbox-e2e-http || true
          docker logs proxbox-e2e || true
          docker logs proxmox-e2e-mock || true
          docker logs netbox-e2e-postgres || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http proxmox-e2e-mock proxbox-e2e 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true

  publish-pypi:
    name: publish to PyPI
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    needs: [prepare-release, validate-pypi-candidate, e2e-pre-publish]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload to PyPI
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv run --with twine python -m twine upload \
            --non-interactive \
            --repository-url https://upload.pypi.org/legacy/ \
            --username "$PYPI_USERNAME" \
            --password "$PYPI_TOKEN" \
            dist/*

  validate-pypi:
    name: validate PyPI / py${{ matrix.python-version }}
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    needs: [prepare-release, publish-pypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Validate package install from PyPI
        env:
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -eux
          uv venv --python "${{ matrix.python-version }}" .package-smoke
          installed=0
          for i in $(seq 1 30); do
            if uv pip install \
              --python .package-smoke/bin/python \
              --index-url https://pypi.org/simple/ \
              "${PACKAGE_NAME}==${PACKAGE_VERSION}"; then
              installed=1
              break
            fi
            sleep 10
          done
          if [ "$installed" -ne 1 ]; then
            exit 1
          fi
          .package-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata
          import os

          package_name = os.environ["PACKAGE_NAME"]
          package_version = os.environ["PACKAGE_VERSION"]
          installed_version = metadata.version(package_name)
          if installed_version != package_version:
              raise SystemExit(
                  f"Installed {package_name} {installed_version}, expected {package_version}"
              )
          import proxbox_api.main  # noqa: F401
          from proxbox_api.proxmox_to_netbox.proxmox_schema import (
              load_proxmox_generated_openapi,
          )

          assert load_proxmox_generated_openapi().get("paths")
          PY

  publish-docker:
    name: publish Docker images
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    needs: [prepare-release, validate-pypi]
    uses: ./.github/workflows/docker-hub-publish.yml
    secrets: inherit
    with:
      source_ref: ${{ needs.prepare-release.outputs.tag }}
      mode: publish

  e2e-post-publish:
    name: E2E post-publish (published artifacts) [${{ matrix.netbox-version }}]
    runs-on: ubuntu-latest
    if: needs.prepare-release.outputs.publish_target == 'pypi'
    needs: [publish-docker, prepare-release]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        netbox-version: ${{ fromJSON(needs.prepare-release.outputs.netbox_versions) }}
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:${{ matrix.netbox-version }}
      PROXMOX_OPENAPI_IMAGE: emersonfelipesp/proxmox-sdk:latest
      PROXBOX_API_IMAGE: emersonfelipesp/proxbox-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync E2E dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Start E2E stack (published artifacts)
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -eux
          docker network create proxbox-e2e || true
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'
          NETBOX_PROXBOX_TARGET='https://github.com/emersonfelipesp/netbox-proxbox/archive/refs/tags/v0.0.15rc11.tar.gz'

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http proxmox-e2e-mock proxbox-e2e 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          docker pull "${PROXMOX_OPENAPI_IMAGE}"
          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p 18006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            "${PROXMOX_OPENAPI_IMAGE}"

          if ! docker pull "${NETBOX_IMAGE}" 2>/dev/null; then
            NETBOX_VERSION="${NETBOX_IMAGE##*:}"
            git clone --depth 1 https://github.com/netbox-community/netbox-docker.git /tmp/netbox-docker
            git clone --depth 1 --branch "${NETBOX_VERSION}" \
              https://github.com/netbox-community/netbox.git /tmp/netbox-docker/.netbox
            docker build \
              --build-arg "FROM=ubuntu:24.04" \
              --build-arg "NETBOX_PATH=.netbox" \
              -t "${NETBOX_IMAGE}" \
              /tmp/netbox-docker
          fi

          docker run -d --name netbox-e2e-http --network proxbox-e2e -p 18080:8000 \
            -e DB_HOST=netbox-e2e-postgres \
            -e DB_WAIT_TIMEOUT=600 \
            -e DB_NAME=netbox \
            -e DB_USER=netbox \
            -e DB_PASSWORD=netbox \
            -e REDIS_HOST=netbox-e2e-redis \
            -e REDIS_DATABASE=0 \
            -e REDIS_CACHE_HOST=netbox-e2e-redis \
            -e REDIS_CACHE_DATABASE=1 \
            -e REDIS_TASK_HOST=netbox-e2e-redis \
            -e REDIS_TASK_DATABASE=2 \
            -e SECRET_KEY="$SECRET_KEY" \
            -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http" \
            -e LOGIN_REQUIRED=False \
            --entrypoint /bin/bash \
            "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir '${NETBOX_PROXBOX_TARGET}' && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && i=0 && until /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py migrate --no-input; do i=\$((i+1)); if [ \$i -ge 120 ]; then echo 'migrate exhausted retries'; exit 1; fi; sleep 2; done && /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"

          docker pull "${PROXBOX_API_IMAGE}:${RELEASE_VERSION}"
          docker run -d --name proxbox-e2e --network proxbox-e2e -p 18081:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            -e PROXBOX_ENCRYPTION_KEY \
            -e PROXBOX_BIND_HOST=0.0.0.0 \
            "${PROXBOX_API_IMAGE}:${RELEASE_VERSION}"

      - name: Wait for services and verify connectivity
        run: |
          set -eux
          for i in $(seq 1 900); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/ 2>/dev/null || true)"
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ]; then break; fi
            sleep 2
            if [ "$i" -eq 900 ]; then echo "NetBox did not become ready"; docker logs netbox-e2e-http || true; exit 1; fi
          done

          for i in $(seq 1 60); do
            api_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/status/ 2>/dev/null || true)"
            if [ "$api_code" -ge 200 ] 2>/dev/null && [ "$api_code" -lt 400 ]; then break; fi
            sleep 2
            if [ "$i" -eq 60 ]; then echo "NetBox API did not become ready"; docker logs netbox-e2e-http || true; exit 1; fi
          done

          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 http://127.0.0.1:18006/openapi.json >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 60 ]; then echo "proxmox mock did not become ready"; docker logs proxmox-e2e-mock || true; exit 1; fi
          done

          for i in $(seq 1 120); do
            if curl -fsS --max-time 5 http://127.0.0.1:18081/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 120 ]; then echo "proxbox-api did not become ready"; docker logs proxbox-e2e || true; exit 1; fi
          done

          TOKEN_OUTPUT=$(docker exec netbox-e2e-http /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u, _ = User.objects.get_or_create(username='admin', defaults={'email':'admin@example.com'}); u.email='admin@example.com'; u.is_staff=True; u.is_superuser=True; u.set_password('admin'); u.save(); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          NETBOX_API_TOKEN=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          PROXBOX_API_KEY="proxbox-e2e-api-key-proxbox-e2e-api-key-1234567890"
          curl -fsS -X POST http://127.0.0.1:18081/auth/register-key \
            -H "Content-Type: application/json" \
            --data "{\"api_key\":\"${PROXBOX_API_KEY}\",\"label\":\"e2e\"}"
          curl -fsS -X POST http://127.0.0.1:18081/netbox/endpoint \
            -H "Content-Type: application/json" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}" \
            --data "{\"name\":\"e2e-netbox\",\"ip_address\":\"netbox-e2e-http\",\"domain\":\"\",\"port\":8000,\"token_version\":\"v1\",\"token\":\"${NETBOX_API_TOKEN}\",\"verify_ssl\":false}"

          STATUS_JSON=$(curl -sS http://127.0.0.1:18081/netbox/status -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}")
          echo "$STATUS_JSON"
          export STATUS_JSON
          python3 - <<'PY'
          import json, os, sys
          p = json.loads(os.environ["STATUS_JSON"])
          if not (p.get("available") or "netbox-version" in p or "django-version" in p):
              sys.exit(f"NetBox status check failed: {p}")
          PY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker logs netbox-e2e-http || true
          docker logs proxbox-e2e || true
          docker logs proxmox-e2e-mock || true
          docker logs netbox-e2e-postgres || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http proxmox-e2e-mock proxbox-e2e 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true
