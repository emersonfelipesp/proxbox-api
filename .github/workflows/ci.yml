name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      netbox_proxbox_mode:
        description: 'netbox-proxbox install mode (dev = GitHub develop branch, pypi = latest PyPI release)'
        type: choice
        options: [dev, pypi]
        default: dev
  release:
    types: [published]

env:
  PROXBOX_ENCRYPTION_KEY: proxbox-ci-only-encryption-key-not-a-secret

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Ty (type check)
        run: |
          uv run ty check \
            proxbox_api/types \
            proxbox_api/utils/retry.py \
            proxbox_api/schemas/sync.py

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_sdk.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Core tests
        run: uv run pytest tests/ -v --ignore=tests/e2e --ignore=tests/test_generated_proxmox_routes.py --tb=short

  test-py311-floor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Core tests (3.11 floor)
        run: uv run pytest tests/ -v --ignore=tests/e2e --ignore=tests/test_generated_proxmox_routes.py --tb=short

  test-free-threaded:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14t"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_sdk.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Core tests
        continue-on-error: true
        run: uv run pytest tests/ -v --ignore=tests/e2e --ignore=tests/test_generated_proxmox_routes.py --ignore=tests/test_endpoint_crud.py --tb=short

  docker-bind-smoke:
    name: Docker bind-host smoke (issue #52)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build raw image
        run: docker build --target raw -t proxbox-api:bind-smoke .

      # We verify success by reading uvicorn's startup log instead of curling
      # the published port. Docker's userland port proxy cannot forward an
      # IPv4 host-side connection to an IPv6-only container listener, so a
      # `[::]:PORT` listener is unreachable via `-p 127.0.0.1:HOST:CONTAINER`
      # mapping even when the bind itself is correct. Reading the container
      # log directly checks what issue #52 actually broke: container startup.
      - name: Bind to IPv6 dual-stack (PROXBOX_BIND_HOST=::)
        run: |
          set -eu
          docker run -d --name pb-v6 -e PROXBOX_BIND_HOST=:: -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 -e PROXBOX_ENCRYPTION_KEY proxbox-api:bind-smoke
          for i in $(seq 1 90); do
            log=$(docker logs pb-v6 2>&1 || true)
            case "$log" in
              *'Name does not resolve'*|*'getaddrinfo'*)
                echo "FAIL: bind crashed (issue #52 regression):"; echo "$log"; exit 1 ;;
              *'Uvicorn running on http://[::]:'*)
                echo "OK: uvicorn bound IPv6 dual-stack ($i s)"; exit 0 ;;
            esac
            sleep 1
          done
          echo "TIMEOUT waiting for uvicorn to bind"; docker logs pb-v6; exit 1

      - name: Bind tolerates Compose list-form quoted value (regression for #52)
        run: |
          set -eu
          docker run -d --name pb-v6q -e 'PROXBOX_BIND_HOST="::"' -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 -e PROXBOX_ENCRYPTION_KEY proxbox-api:bind-smoke
          for i in $(seq 1 90); do
            log=$(docker logs pb-v6q 2>&1 || true)
            case "$log" in
              *'Name does not resolve'*|*'getaddrinfo'*)
                echo "FAIL: sanitizer regressed (issue #52):"; echo "$log"; exit 1 ;;
              *'Uvicorn running on http://[::]:'*)
                echo "OK: sanitizer stripped quotes, bound IPv6 ($i s)"; exit 0 ;;
            esac
            sleep 1
          done
          echo "TIMEOUT"; docker logs pb-v6q; exit 1

      - name: Default bind (no PROXBOX_BIND_HOST set) still works
        run: |
          set -eu
          docker run -d --name pb-default -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 -e PROXBOX_ENCRYPTION_KEY proxbox-api:bind-smoke
          for i in $(seq 1 90); do
            log=$(docker logs pb-default 2>&1 || true)
            case "$log" in
              *'Name does not resolve'*|*'getaddrinfo'*)
                echo "FAIL: default bind broken:"; echo "$log"; exit 1 ;;
              *'Uvicorn running on http://0.0.0.0:'*)
                echo "OK: default bind 0.0.0.0 ($i s)"; exit 0 ;;
            esac
            sleep 1
          done
          echo "TIMEOUT"; docker logs pb-default; exit 1

      - name: Build granian image
        run: docker build --target granian -t proxbox-api:bind-smoke-granian .

      - name: Granian image tolerates Compose list-form quoted value (regression for #52)
        run: |
          set -eu
          docker run -d --name pb-v6q-granian \
            -e 'PROXBOX_BIND_HOST="::"' \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            -e PROXBOX_ENCRYPTION_KEY \
            proxbox-api:bind-smoke-granian
          for i in $(seq 1 120); do
            log=$(docker logs pb-v6q-granian 2>&1 || true)
            case "$log" in
              *'Name does not resolve'*|*'getaddrinfo'*)
                echo "FAIL: granian sanitizer regressed (issue #52):"; echo "$log"; exit 1 ;;
            esac
            # granian formats the IPv6 bind as `Listening at: https://:::PORT`
            # (three literal colons, no brackets) — distinct from uvicorn's
            # `http://[::]:PORT`.
            case "$log" in
              *'Listening at: '*':::'*)
                # Cross-check: container must still be running (granian did not crash post-bind).
                if [ "$(docker inspect -f '{{.State.Running}}' pb-v6q-granian)" = "true" ]; then
                  echo "OK: granian bound IPv6 dual-stack ($i s)"; exit 0
                fi ;;
            esac
            sleep 1
          done
          echo "TIMEOUT waiting for granian to bind"; docker logs pb-v6q-granian; exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f pb-v6 pb-v6q pb-default pb-v6q-granian 2>/dev/null || true

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      netbox_versions: ${{ steps.gen.outputs.netbox_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate E2E matrix
        id: gen
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          event = os.environ.get("GITHUB_EVENT_NAME", "push")
          mode_input = os.environ.get("INPUT_NETBOX_PROXBOX_MODE", "dev")
          netbox_versions = json.loads(
              Path(".github/netbox-versions.json").read_text(encoding="utf-8")
          )

          if event == "release":
              modes = ["dev", "pypi"]
          elif event == "workflow_dispatch":
              modes = [mode_input]
          else:
              modes = ["dev"]

          base = [
            {"netbox_transport":"https_nginx","netbox_public_url":"https://127.0.0.1:18443","netbox_endpoint_host":"netbox-e2e-nginx","netbox_endpoint_port":8443,"netbox_endpoint_verify_ssl":True,"netbox_wait_url":"https://127.0.0.1:18443/api/","netbox_app_container":"netbox-e2e-http","proxbox_transport":"http_raw","proxbox_docker_target":"raw","proxbox_base_url":"http://127.0.0.1:18081","proxbox_host_port":18081,"proxbox_curl_flags":"","network_stack":"ipv4"},
            {"netbox_transport":"https_granian","netbox_public_url":"https://127.0.0.1:18443","netbox_endpoint_host":"netbox-e2e-granian","netbox_endpoint_port":8443,"netbox_endpoint_verify_ssl":True,"netbox_wait_url":"https://127.0.0.1:18443/api/","netbox_app_container":"netbox-e2e-granian","proxbox_transport":"http_raw","proxbox_docker_target":"raw","proxbox_base_url":"http://127.0.0.1:18081","proxbox_host_port":18081,"proxbox_curl_flags":"","network_stack":"ipv4"},
            {"netbox_transport":"http_manage","netbox_public_url":"http://127.0.0.1:18080","netbox_endpoint_host":"netbox-e2e-http","netbox_endpoint_port":8000,"netbox_endpoint_verify_ssl":False,"netbox_wait_url":"http://127.0.0.1:18080/api/","netbox_app_container":"netbox-e2e-http","proxbox_transport":"https_nginx","proxbox_docker_target":"nginx","proxbox_base_url":"https://127.0.0.1:18481","proxbox_host_port":18481,"proxbox_curl_flags":"-k","network_stack":"ipv4"},
            {"netbox_transport":"http_manage","netbox_public_url":"http://127.0.0.1:18080","netbox_endpoint_host":"netbox-e2e-http","netbox_endpoint_port":8000,"netbox_endpoint_verify_ssl":False,"netbox_wait_url":"http://127.0.0.1:18080/api/","netbox_app_container":"netbox-e2e-http","proxbox_transport":"https_granian","proxbox_docker_target":"granian","proxbox_base_url":"https://127.0.0.1:18481","proxbox_host_port":18481,"proxbox_curl_flags":"-k","network_stack":"ipv4"},
            {"netbox_transport":"https_granian","netbox_public_url":"https://127.0.0.1:18443","netbox_endpoint_host":"netbox-e2e-granian","netbox_endpoint_port":8443,"netbox_endpoint_verify_ssl":True,"netbox_wait_url":"https://127.0.0.1:18443/api/","netbox_app_container":"netbox-e2e-granian","proxbox_transport":"https_granian","proxbox_docker_target":"granian","proxbox_base_url":"https://127.0.0.1:18481","proxbox_host_port":18481,"proxbox_curl_flags":"-k","network_stack":"ipv4"},
            {"netbox_transport":"http_manage","netbox_public_url":"http://127.0.0.1:18080","netbox_endpoint_host":"netbox-e2e-http","netbox_endpoint_port":8000,"netbox_endpoint_verify_ssl":False,"netbox_wait_url":"http://127.0.0.1:18080/api/","netbox_app_container":"netbox-e2e-http","proxbox_transport":"http_raw","proxbox_docker_target":"raw","proxbox_base_url":"http://127.0.0.1:18081","proxbox_host_port":18081,"proxbox_curl_flags":"","network_stack":"ipv4"},
            {"netbox_transport":"https_granian","netbox_public_url":"https://[::1]:18443","netbox_endpoint_host":"netbox-e2e-granian","netbox_endpoint_port":8443,"netbox_endpoint_verify_ssl":True,"netbox_wait_url":"https://[::1]:18443/api/","netbox_app_container":"netbox-e2e-granian","proxbox_transport":"http_raw","proxbox_docker_target":"raw","proxbox_base_url":"http://[::1]:18081","proxbox_host_port":18081,"proxbox_curl_flags":"","network_stack":"ipv6"},
          ]

          includes = [
              dict(**entry, netbox_proxbox_mode=mode, netbox_version=ver)
              for entry in base
              for mode in modes
              for ver in netbox_versions
          ]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps({'include': includes})}\n")
              fh.write(f"netbox_versions={json.dumps(netbox_versions)}\n")
          PYEOF
        env:
          INPUT_NETBOX_PROXBOX_MODE: ${{ inputs.netbox_proxbox_mode || 'dev' }}

  build-netbox-image:
    name: Build NetBox image [${{ matrix.netbox-version }}]
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        netbox-version: ${{ fromJSON(needs.setup.outputs.netbox_versions) }}
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:${{ matrix.netbox-version }}
    steps:
      - name: Check if NetBox image exists on registry
        id: check
        run: |
          if docker pull "${NETBOX_IMAGE}" 2>/dev/null; then
            echo "image_built=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_built=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build NetBox image from source
        if: steps.check.outputs.image_built == 'true'
        run: |
          NETBOX_VERSION="${NETBOX_IMAGE##*:}"
          git clone --depth 1 https://github.com/netbox-community/netbox-docker.git /tmp/netbox-docker
          git clone --depth 1 --branch "${NETBOX_VERSION}" \
            https://github.com/netbox-community/netbox.git /tmp/netbox-docker/.netbox
          docker build \
            --build-arg "FROM=ubuntu:24.04" \
            --build-arg "NETBOX_PATH=.netbox" \
            -t "${NETBOX_IMAGE}" \
            /tmp/netbox-docker
          docker save "${NETBOX_IMAGE}" | gzip > /tmp/netbox-image.tar.gz

      - name: Upload NetBox image artifact
        if: steps.check.outputs.image_built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: netbox-image-${{ matrix.netbox-version }}
          path: /tmp/netbox-image.tar.gz
          retention-days: 1

  e2e-docker:
    name: E2E Docker / NB:${{ matrix.netbox_transport }} PB:${{ matrix.proxbox_transport }} [${{ matrix.network_stack }}] [${{ matrix.netbox_version }}] (${{ matrix.netbox_proxbox_mode }})
    runs-on: ubuntu-latest
    needs: [test, setup, build-netbox-image]
    if: |
      always() &&
      !cancelled() &&
      needs.test.result == 'success' &&
      needs.setup.result == 'success'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:${{ matrix.netbox_version }}
      PROXMOX_OPENAPI_IMAGE: emersonfelipesp/proxmox-sdk:latest
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
      UV_HTTP_TIMEOUT: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Resolve netbox-proxbox install target
        id: proxbox_pkg
        run: |
          if [ "${{ matrix.netbox_proxbox_mode }}" = "dev" ]; then
            echo "target=https://github.com/emersonfelipesp/netbox-proxbox/archive/refs/heads/develop.tar.gz" >> "$GITHUB_OUTPUT"
          else
            echo "target=netbox-proxbox" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve dev SDK overrides
        run: |
          if [ "${{ matrix.netbox_proxbox_mode }}" = "dev" ]; then
            echo 'DEV_OVERRIDES=git+https://github.com/emersonfelipesp/netbox-sdk.git@main git+https://github.com/emersonfelipesp/proxmox-sdk.git@main' >> "$GITHUB_ENV"
          else
            echo "DEV_OVERRIDES=" >> "$GITHUB_ENV"
          fi

      - name: Resolve NetBox image source
        id: netbox_image
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull "${NETBOX_IMAGE}" 2>/dev/null; then
              echo "source=registry" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Registry pull attempt ${attempt}/5 failed for ${NETBOX_IMAGE}; retrying in $((attempt * 10))s"
            sleep "$((attempt * 10))"
          done
          echo "source=artifact" >> "$GITHUB_OUTPUT"

      - name: Download NetBox image artifact (if built from source)
        if: steps.netbox_image.outputs.source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: netbox-image-${{ matrix.netbox_version }}
          path: /tmp/

      - name: Load NetBox image from artifact
        if: steps.netbox_image.outputs.source == 'artifact'
        run: |
          docker load < /tmp/netbox-image.tar.gz

      - name: Start E2E stack
        run: |
          set -eux
          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            docker network create --ipv6 --subnet fd00:e2e::/64 proxbox-e2e || true
            HOST_BIND="[::]:"
          else
            docker network create proxbox-e2e || true
            HOST_BIND=""
          fi
          echo "HOST_BIND=${HOST_BIND}" >> "$GITHUB_ENV"
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'
          NETBOX_GRANIAN_HOST="0.0.0.0"
          PROXMOX_MOCK_BIND_HOST="0.0.0.0"
          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            NETBOX_GRANIAN_HOST="::"
            PROXMOX_MOCK_BIND_HOST="::"
          fi

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian netbox-e2e-rqworker proxmox-e2e-mock proxbox-e2e 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          docker pull "${PROXMOX_OPENAPI_IMAGE}"

          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p "${HOST_BIND}18006:8000" \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            -e PROXMOX_MOCK_BIND_HOST="${PROXMOX_MOCK_BIND_HOST}" \
            "${PROXMOX_OPENAPI_IMAGE}" \
            sh -c 'exec uvicorn ${APP_MODULE} --host "${PROXMOX_MOCK_BIND_HOST}" --port "${PORT:-8000}"'

          mkdir -p .ci-tls
          cat > .ci-tls/netbox-openssl.cnf <<'EOF'
          [ req ]
          default_bits       = 2048
          prompt             = no
          default_md         = sha256
          req_extensions     = req_ext
          distinguished_name = dn

          [ dn ]
          CN = netbox-e2e

          [ req_ext ]
          subjectAltName = @alt_names

          [ v3_ca ]
          basicConstraints = critical, CA:true
          keyUsage = critical, keyCertSign, cRLSign
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer

          [ v3_server ]
          basicConstraints = critical, CA:false
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer

          [ alt_names ]
          DNS.1 = localhost
          DNS.2 = netbox-e2e-http
          DNS.3 = netbox-e2e-nginx
          DNS.4 = netbox-e2e-granian
          IP.1 = 127.0.0.1
          IP.2 = ::1
          EOF

          openssl req -x509 -newkey rsa:2048 -sha256 -days 2 -nodes \
            -keyout .ci-tls/ca.key \
            -out .ci-tls/ca.crt \
            -extensions v3_ca \
            -config .ci-tls/netbox-openssl.cnf \
            -subj '/CN=proxbox-e2e-ca'

          openssl req -new -newkey rsa:2048 -nodes \
            -keyout .ci-tls/netbox.key \
            -out .ci-tls/netbox.csr \
            -config .ci-tls/netbox-openssl.cnf

          openssl x509 -req -in .ci-tls/netbox.csr \
            -CA .ci-tls/ca.crt -CAkey .ci-tls/ca.key -CAcreateserial \
            -out .ci-tls/netbox.crt -days 2 -sha256 \
            -extensions v3_server -extfile .ci-tls/netbox-openssl.cnf

          openssl pkcs8 -topk8 -nocrypt \
            -in .ci-tls/netbox.key \
            -out .ci-tls/netbox-pkcs8.key

          cat > .ci-tls/netbox-nginx.conf <<'EOF'
          server {
            listen 8443 ssl;
            server_name _;
            ssl_certificate /certs/netbox.crt;
            ssl_certificate_key /certs/netbox.key;

            location / {
              proxy_pass http://netbox-e2e-http:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
            }
          }
          EOF

          if [ "${{ matrix.netbox_transport }}" = "http_manage" ]; then
            docker run -d --name netbox-e2e-http --network proxbox-e2e -p "${HOST_BIND}18080:8000" \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir '${{ steps.proxbox_pkg.outputs.target }}' && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"
          elif [ "${{ matrix.netbox_transport }}" = "https_nginx" ]; then
            docker run -d --name netbox-e2e-http --network proxbox-e2e \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir '${{ steps.proxbox_pkg.outputs.target }}' && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"

            docker run -d --name netbox-e2e-nginx --network proxbox-e2e -p "${HOST_BIND}18443:8443" \
              -v "$PWD/.ci-tls:/certs:ro" \
              -v "$PWD/.ci-tls/netbox-nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
              nginx:1.27-alpine
          else
            docker run -d --name netbox-e2e-granian --network proxbox-e2e -p "${HOST_BIND}18443:8443" \
              -v "$PWD/.ci-tls:/certs:ro" \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e PYTHONPATH=/opt/netbox/netbox \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir '${{ steps.proxbox_pkg.outputs.target }}' granian && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/granian --interface wsgi --host '${NETBOX_GRANIAN_HOST}' --port 8443 --ssl-certificate /certs/netbox.crt --ssl-keyfile /certs/netbox-pkcs8.key netbox.wsgi:application"
          fi

      - name: Trust E2E NetBox CA on runner
        if: matrix.netbox_transport != 'http_manage'
        run: |
          set -eux
          sudo cp "$GITHUB_WORKSPACE/.ci-tls/ca.crt" /usr/local/share/ca-certificates/proxbox-e2e-ca.crt
          sudo update-ca-certificates

      - name: Wait for NetBox and create API token
        run: |
          set -eux
          for i in $(seq 1 600); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' "${{ matrix.netbox_wait_url }}" 2>/dev/null || true)"
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 600 ]; then
              echo "NetBox did not become ready"
              docker logs netbox-e2e-http || true
              docker logs netbox-e2e-nginx || true
              docker logs netbox-e2e-granian || true
              exit 1
            fi
          done

          # Confirm the NetBox API is fully initialized (not just the web UI)
          for i in $(seq 1 60); do
            api_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' "${{ matrix.netbox_wait_url }}status/" 2>/dev/null || true)"
            if [ "$api_code" -ge 200 ] 2>/dev/null && [ "$api_code" -lt 400 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "NetBox API did not become ready"
              docker logs netbox-e2e-http || true
              docker logs netbox-e2e-nginx || true
              docker logs netbox-e2e-granian || true
              exit 1
            fi
          done

          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            PROXMOX_MOCK_HOST_URL="http://[::1]:18006"
          else
            PROXMOX_MOCK_HOST_URL="http://127.0.0.1:18006"
          fi
          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 "${PROXMOX_MOCK_HOST_URL}/openapi.json" >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "proxmox mock did not become ready"
              docker logs proxmox-e2e-mock || true
              exit 1
            fi
          done
          echo "PROXMOX_MOCK_HOST_URL=${PROXMOX_MOCK_HOST_URL}" >> "$GITHUB_ENV"

          TOKEN_OUTPUT=$(docker exec ${{ matrix.netbox_app_container }} /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u, _ = User.objects.get_or_create(username='admin', defaults={'email':'admin@example.com'}); u.email='admin@example.com'; u.is_staff=True; u.is_superuser=True; u.set_password('admin'); u.save(); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          TOKEN_ID=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f1)
          TOKEN_VALUE=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          echo "NETBOX_TOKEN_ID=$TOKEN_ID" >> "$GITHUB_ENV"
          echo "NETBOX_API_TOKEN=$TOKEN_VALUE" >> "$GITHUB_ENV"

      - name: Build and start Proxbox API backend container
        run: |
          set -eux
          docker build --target "${{ matrix.proxbox_docker_target }}" \
            ${DEV_OVERRIDES:+--build-arg "DEV_OVERRIDES=${DEV_OVERRIDES}"} \
            -t "proxbox-e2e:${{ matrix.proxbox_transport }}" .

          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            PROXBOX_BIND_HOST_VALUE="::"
          else
            PROXBOX_BIND_HOST_VALUE="0.0.0.0"
          fi

          docker run -d --name proxbox-e2e --network proxbox-e2e -p "${HOST_BIND}${{ matrix.proxbox_host_port }}:8000" \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            -e PROXBOX_BIND_HOST="${PROXBOX_BIND_HOST_VALUE}" \
            -e PROXBOX_ENCRYPTION_KEY \
            -e SSL_CERT_FILE=/ci-tls/ca.crt \
            -v "$GITHUB_WORKSPACE/.ci-tls:/ci-tls:ro" \
            "proxbox-e2e:${{ matrix.proxbox_transport }}"

          for i in $(seq 1 120); do
            if curl ${{ matrix.proxbox_curl_flags }} -fsS --max-time 5 "${{ matrix.proxbox_base_url }}/" >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 120 ]; then
              echo "Proxbox API backend did not become ready"
              docker logs proxbox-e2e || true
              exit 1
            fi
          done

      - name: Verify Proxbox API reaches NetBox with requested transport
        run: |
          set -eux
          PROXBOX_API_KEY="proxbox-e2e-api-key-proxbox-e2e-api-key-1234567890"

          curl ${{ matrix.proxbox_curl_flags }} -fsS -X POST \
            "${{ matrix.proxbox_base_url }}/auth/register-key" \
            -H "Content-Type: application/json" \
            --data "{\"api_key\":\"${PROXBOX_API_KEY}\",\"label\":\"e2e\"}"

          curl ${{ matrix.proxbox_curl_flags }} -fsS -X POST \
            "${{ matrix.proxbox_base_url }}/netbox/endpoint" \
            -H "Content-Type: application/json" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}" \
            --data "{\"name\":\"e2e-netbox\",\"ip_address\":\"${{ matrix.netbox_endpoint_host }}\",\"domain\":\"\",\"port\":${{ matrix.netbox_endpoint_port }},\"token_version\":\"v1\",\"token\":\"${NETBOX_API_TOKEN}\",\"verify_ssl\":${{ matrix.netbox_endpoint_verify_ssl }}}"

          STATUS_JSON=$(curl ${{ matrix.proxbox_curl_flags }} -sS \
            "${{ matrix.proxbox_base_url }}/netbox/status" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}")
          echo "$STATUS_JSON"
          export STATUS_JSON
          python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["STATUS_JSON"])
          if "available" in payload:
              ok = bool(payload.get("available"))
          elif "netbox-version" in payload or "django-version" in payload:
              ok = True
          else:
              ok = False

          if not ok:
              raise SystemExit(f"NetBox status check failed: {payload}")
          PY

      - name: Create Proxbox custom fields in NetBox
        run: |
          set -eux
          PROXBOX_API_KEY="proxbox-e2e-api-key-proxbox-e2e-api-key-1234567890"
          curl ${{ matrix.proxbox_curl_flags }} -fsS \
            "${{ matrix.proxbox_base_url }}/extras/extras/custom-fields/create" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}"

      - name: Run E2E tests (Docker proxmox mock)
        env:
          PROXBOX_E2E_NETBOX_URL: ${{ matrix.netbox_public_url }}
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXMOX_API_MODE: mock
          PROXMOX_MOCK_PUBLISHED_URL: ${{ env.PROXMOX_MOCK_HOST_URL }}
        run: |
          uv run pytest tests/e2e/ -m "mock_http" --tb=short -v

      - name: Run E2E tests with in-process MockBackend
        if: github.ref == 'refs/heads/main'
        env:
          PROXBOX_E2E_NETBOX_URL: ${{ matrix.netbox_public_url }}
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXMOX_API_MODE: mock
        run: |
          uv run pytest tests/e2e/ -m "mock_backend" --tb=short -v

      - name: Cleanup
        if: always()
        run: |
          docker rm -f proxbox-e2e netbox-e2e-rqworker netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian proxmox-e2e-mock netbox-e2e-postgres netbox-e2e-redis 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true
