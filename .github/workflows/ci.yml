name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Start proxmox-mock-published service
        run: |
          docker rm -f proxmox-mock-published 2>/dev/null || true
          docker pull emersonfelipesp/proxmox-openapi:latest
          docker run -d --name proxmox-mock-published \
            -p 8006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            emersonfelipesp/proxmox-openapi:latest

      - name: Wait for proxmox-mock-published to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8006/health > /dev/null 2>&1 || curl -sf http://localhost:8006/ > /dev/null 2>&1; then
              echo "proxmox-mock-published is ready"
              exit 0
            fi
            echo "Waiting for proxmox-mock-published... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for proxmox-mock-published"
          docker logs proxmox-mock-published
          exit 1

      - name: Ruff (lint + format check)
        run: |
          ruff check . &
          ruff format --check . &
          wait

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_openapi.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Start local mock container (for HTTP tests)
        run: |
          docker rm -f proxmox-mock-local 2>/dev/null || true
          docker run -d --name proxmox-mock-local \
            -p 8007:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            emersonfelipesp/proxmox-openapi:latest

      - name: Wait for local mock container to be ready
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8007/health > /dev/null 2>&1 || curl -sf http://localhost:8007/ > /dev/null 2>&1; then
              echo "Local mock container is ready"
              exit 0
            fi
            echo "Waiting for local mock container... ($i/15)"
            sleep 2
          done
          echo "Timeout waiting for local mock container"
          docker logs proxmox-mock-local
          exit 1

      - name: "E2E — local workspace vs NetBox demo (MockBackend)"
        env:
          PROXMOX_API_MODE: mock
        run: uv run pytest tests/e2e/ -m "not image_http and mock_backend" --tb=short -v

      - name: "E2E — local workspace vs NetBox demo (HTTP published)"
        env:
          PROXMOX_API_MODE: mock
          PROXMOX_MOCK_PUBLISHED_URL: http://localhost:8006
          PROXMOX_MOCK_LOCAL_URL: http://localhost:8007
        run: uv run pytest tests/e2e/ -m "not image_http and mock_http" --tb=short -v --proxbox-mock-url-published=http://localhost:8006 --proxbox-mock-url-local=http://localhost:8007

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Playwright Trace
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace-demo
          path: .playwright/trace/
          retention-days: 7

      - name: Cleanup local container
        if: always()
        run: docker rm -f proxmox-mock-local

  e2e-http:
    runs-on: ubuntu-latest
    needs: [test, docker-images]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !cancelled() &&
      needs.test.result == 'success' &&
      needs.docker-images.result == 'success'
    env:
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Start proxmox-mock service
        run: |
          docker rm -f proxmox-mock-published 2>/dev/null || true
          docker run -d --name proxmox-mock-published \
            -p 8006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            emersonfelipesp/proxmox-openapi:latest

      - name: Start local mock container
        run: |
          docker rm -f proxmox-mock-local 2>/dev/null || true
          docker run -d --name proxmox-mock-local \
            -p 8007:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            emersonfelipesp/proxmox-openapi:latest

      - name: "E2E — published image for current commit (raw uvicorn, HTTP)"
        run: |
          set -eux
          IMAGE_REF="emersonfelipesp/proxbox-api:sha-${{ github.sha }}"
          docker pull "$IMAGE_REF"
          docker rm -f proxbox-e2e-http 2>/dev/null || true
          docker run -d --name proxbox-e2e-http \
            -p 127.0.0.1:18080:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            "$IMAGE_REF"
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout http"; docker logs proxbox-e2e-http; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=http://127.0.0.1:18080
          export PROXMOX_API_MODE=mock
          export PROXMOX_MOCK_PUBLISHED_URL=http://localhost:8006
          export PROXMOX_MOCK_LOCAL_URL=http://localhost:8007
          uv run pytest tests/e2e/ -m image_http --tb=short -v \
            --proxbox-mock-url-published=http://localhost:8006 \
            --proxbox-mock-url-local=http://localhost:8007
          docker rm -f proxbox-e2e-http

      - name: Cleanup local container
        if: always()
        run: docker rm -f proxmox-mock-local

  e2e-https:
