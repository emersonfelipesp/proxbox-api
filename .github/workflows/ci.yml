name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          ruff check . &
          ruff format --check . &
          wait

      - name: Ty (type check)
        run: uv run ty check proxbox_api/types proxbox_api/utils/retry.py

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_openapi.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Core tests
        run: uv run pytest tests/ -v --ignore=tests/e2e --ignore=tests/test_generated_proxmox_routes.py --deselect=tests/test_individual_sync.py::test_sync_backup_individual_reports_updated_when_backup_exists --tb=short

  e2e-docker:
    name: E2E Docker / NB:${{ matrix.netbox_transport }} PB:${{ matrix.proxbox_transport }}
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      !cancelled() &&
      needs.test.result == 'success'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - netbox_transport: https_nginx
            netbox_public_url: https://127.0.0.1:18443
            netbox_endpoint_host: netbox-e2e-nginx
            netbox_endpoint_port: 8443
            netbox_endpoint_verify_ssl: true
            netbox_wait_url: https://127.0.0.1:18443/api/
            netbox_app_container: netbox-e2e-http
            proxbox_transport: http_raw
            proxbox_docker_target: raw
            proxbox_base_url: http://127.0.0.1:18081
            proxbox_host_port: 18081
            proxbox_curl_flags: ""
          - netbox_transport: https_granian
            netbox_public_url: https://127.0.0.1:18443
            netbox_endpoint_host: netbox-e2e-granian
            netbox_endpoint_port: 8443
            netbox_endpoint_verify_ssl: true
            netbox_wait_url: https://127.0.0.1:18443/api/
            netbox_app_container: netbox-e2e-granian
            proxbox_transport: http_raw
            proxbox_docker_target: raw
            proxbox_base_url: http://127.0.0.1:18081
            proxbox_host_port: 18081
            proxbox_curl_flags: ""
          - netbox_transport: http_manage
            netbox_public_url: http://127.0.0.1:18080
            netbox_endpoint_host: netbox-e2e-http
            netbox_endpoint_port: 8000
            netbox_endpoint_verify_ssl: false
            netbox_wait_url: http://127.0.0.1:18080/api/
            netbox_app_container: netbox-e2e-http
            proxbox_transport: https_nginx
            proxbox_docker_target: nginx
            proxbox_base_url: https://127.0.0.1:18481
            proxbox_host_port: 18481
            proxbox_curl_flags: -k
          - netbox_transport: http_manage
            netbox_public_url: http://127.0.0.1:18080
            netbox_endpoint_host: netbox-e2e-http
            netbox_endpoint_port: 8000
            netbox_endpoint_verify_ssl: false
            netbox_wait_url: http://127.0.0.1:18080/api/
            netbox_app_container: netbox-e2e-http
            proxbox_transport: https_granian
            proxbox_docker_target: granian
            proxbox_base_url: https://127.0.0.1:18481
            proxbox_host_port: 18481
            proxbox_curl_flags: -k
          - netbox_transport: https_granian
            netbox_public_url: https://127.0.0.1:18443
            netbox_endpoint_host: netbox-e2e-granian
            netbox_endpoint_port: 8443
            netbox_endpoint_verify_ssl: true
            netbox_wait_url: https://127.0.0.1:18443/api/
            netbox_app_container: netbox-e2e-granian
            proxbox_transport: https_granian
            proxbox_docker_target: granian
            proxbox_base_url: https://127.0.0.1:18481
            proxbox_host_port: 18481
            proxbox_curl_flags: -k
          - netbox_transport: http_manage
            netbox_public_url: http://127.0.0.1:18080
            netbox_endpoint_host: netbox-e2e-http
            netbox_endpoint_port: 8000
            netbox_endpoint_verify_ssl: false
            netbox_wait_url: http://127.0.0.1:18080/api/
            netbox_app_container: netbox-e2e-http
            proxbox_transport: http_raw
            proxbox_docker_target: raw
            proxbox_base_url: http://127.0.0.1:18081
            proxbox_host_port: 18081
            proxbox_curl_flags: ""
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:v4.5
      PROXMOX_OPENAPI_IMAGE: emersonfelipesp/proxmox-openapi:latest
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
      UV_HTTP_TIMEOUT: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Start E2E stack
        run: |
          set -eux
          docker network create proxbox-e2e || true
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian netbox-e2e-rqworker proxmox-e2e-mock proxbox-e2e 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          docker pull "${PROXMOX_OPENAPI_IMAGE}"

          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p 18006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            "${PROXMOX_OPENAPI_IMAGE}"

          mkdir -p .ci-tls
          cat > .ci-tls/netbox-openssl.cnf <<'EOF'
          [ req ]
          default_bits       = 2048
          prompt             = no
          default_md         = sha256
          req_extensions     = req_ext
          distinguished_name = dn

          [ dn ]
          CN = netbox-e2e

          [ req_ext ]
          subjectAltName = @alt_names

          [ v3_ca ]
          basicConstraints = critical, CA:true
          keyUsage = critical, keyCertSign, cRLSign
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer

          [ v3_server ]
          basicConstraints = critical, CA:false
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer

          [ alt_names ]
          DNS.1 = localhost
          DNS.2 = netbox-e2e-http
          DNS.3 = netbox-e2e-nginx
          DNS.4 = netbox-e2e-granian
          IP.1 = 127.0.0.1
          EOF

          openssl req -x509 -newkey rsa:2048 -sha256 -days 2 -nodes \
            -keyout .ci-tls/ca.key \
            -out .ci-tls/ca.crt \
            -extensions v3_ca \
            -config .ci-tls/netbox-openssl.cnf \
            -subj '/CN=proxbox-e2e-ca'

          openssl req -new -newkey rsa:2048 -nodes \
            -keyout .ci-tls/netbox.key \
            -out .ci-tls/netbox.csr \
            -config .ci-tls/netbox-openssl.cnf

          openssl x509 -req -in .ci-tls/netbox.csr \
            -CA .ci-tls/ca.crt -CAkey .ci-tls/ca.key -CAcreateserial \
            -out .ci-tls/netbox.crt -days 2 -sha256 \
            -extensions v3_server -extfile .ci-tls/netbox-openssl.cnf

          openssl pkcs8 -topk8 -nocrypt \
            -in .ci-tls/netbox.key \
            -out .ci-tls/netbox-pkcs8.key

          cat > .ci-tls/netbox-nginx.conf <<'EOF'
          server {
            listen 8443 ssl;
            server_name _;
            ssl_certificate /certs/netbox.crt;
            ssl_certificate_key /certs/netbox.key;

            location / {
              proxy_pass http://netbox-e2e-http:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
            }
          }
          EOF

          if [ "${{ matrix.netbox_transport }}" = "http_manage" ]; then
            docker run -d --name netbox-e2e-http --network proxbox-e2e -p 18080:8000 \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir --upgrade netbox-proxbox && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"
          elif [ "${{ matrix.netbox_transport }}" = "https_nginx" ]; then
            docker run -d --name netbox-e2e-http --network proxbox-e2e \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir --upgrade netbox-proxbox && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py runserver 0.0.0.0:8000 --insecure"

            docker run -d --name netbox-e2e-nginx --network proxbox-e2e -p 18443:8443 \
              -v "$PWD/.ci-tls:/certs:ro" \
              -v "$PWD/.ci-tls/netbox-nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
              nginx:1.27-alpine
          else
            docker run -d --name netbox-e2e-granian --network proxbox-e2e -p 18443:8443 \
              -v "$PWD/.ci-tls:/certs:ro" \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e PYTHONPATH=/opt/netbox/netbox \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "uv pip install --no-cache-dir --upgrade netbox-proxbox granian && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/venv/bin/granian --interface wsgi --host 0.0.0.0 --port 8443 --ssl-certificate /certs/netbox.crt --ssl-keyfile /certs/netbox-pkcs8.key netbox.wsgi:application"
          fi

      - name: Trust E2E NetBox CA on runner
        if: matrix.netbox_transport != 'http_manage'
        run: |
          set -eux
          sudo cp "$GITHUB_WORKSPACE/.ci-tls/ca.crt" /usr/local/share/ca-certificates/proxbox-e2e-ca.crt
          sudo update-ca-certificates

      - name: Wait for NetBox and create API token
        run: |
          set -eux
          for i in $(seq 1 240); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' ${{ matrix.netbox_wait_url }} 2>/dev/null || true)"
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 240 ]; then
              echo "NetBox did not become ready"
              docker logs netbox-e2e-http || true
              docker logs netbox-e2e-nginx || true
              docker logs netbox-e2e-granian || true
              exit 1
            fi
          done

          # Confirm the NetBox API is fully initialized (not just the web UI)
          for i in $(seq 1 60); do
            api_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' "${{ matrix.netbox_wait_url }}status/" 2>/dev/null || true)"
            if [ "$api_code" -ge 200 ] 2>/dev/null && [ "$api_code" -lt 400 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "NetBox API did not become ready"
              docker logs netbox-e2e-http || true
              docker logs netbox-e2e-nginx || true
              docker logs netbox-e2e-granian || true
              exit 1
            fi
          done

          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 http://127.0.0.1:18006/openapi.json >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "proxmox mock did not become ready"
              docker logs proxmox-e2e-mock || true
              exit 1
            fi
          done

          TOKEN_OUTPUT=$(docker exec ${{ matrix.netbox_app_container }} /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u=User.objects.get(username='admin'); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          TOKEN_ID=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f1)
          TOKEN_VALUE=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          echo "NETBOX_TOKEN_ID=$TOKEN_ID" >> "$GITHUB_ENV"
          echo "NETBOX_API_TOKEN=$TOKEN_VALUE" >> "$GITHUB_ENV"

      - name: Build and start Proxbox API backend container
        run: |
          set -eux
          docker build --target "${{ matrix.proxbox_docker_target }}" -t "proxbox-e2e:${{ matrix.proxbox_transport }}" .

          docker run -d --name proxbox-e2e --network proxbox-e2e -p "${{ matrix.proxbox_host_port }}:8000" \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            -e PROXBOX_BIND_HOST=0.0.0.0 \
            -e SSL_CERT_FILE=/ci-tls/ca.crt \
            -v "$GITHUB_WORKSPACE/.ci-tls:/ci-tls:ro" \
            "proxbox-e2e:${{ matrix.proxbox_transport }}"

          for i in $(seq 1 120); do
            if curl ${{ matrix.proxbox_curl_flags }} -fsS --max-time 5 "${{ matrix.proxbox_base_url }}/" >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 120 ]; then
              echo "Proxbox API backend did not become ready"
              docker logs proxbox-e2e || true
              exit 1
            fi
          done

      - name: Verify Proxbox API reaches NetBox with requested transport
        run: |
          set -eux
          PROXBOX_API_KEY="proxbox-e2e-api-key-proxbox-e2e-api-key-1234567890"

          curl ${{ matrix.proxbox_curl_flags }} -fsS -X POST \
            "${{ matrix.proxbox_base_url }}/auth/register-key" \
            -H "Content-Type: application/json" \
            --data "{\"api_key\":\"${PROXBOX_API_KEY}\",\"label\":\"e2e\"}"

          curl ${{ matrix.proxbox_curl_flags }} -fsS -X POST \
            "${{ matrix.proxbox_base_url }}/netbox/endpoint" \
            -H "Content-Type: application/json" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}" \
            --data "{\"name\":\"e2e-netbox\",\"ip_address\":\"${{ matrix.netbox_endpoint_host }}\",\"domain\":\"\",\"port\":${{ matrix.netbox_endpoint_port }},\"token_version\":\"v1\",\"token\":\"${NETBOX_API_TOKEN}\",\"verify_ssl\":${{ matrix.netbox_endpoint_verify_ssl }}}"

          STATUS_JSON=$(curl ${{ matrix.proxbox_curl_flags }} -sS \
            "${{ matrix.proxbox_base_url }}/netbox/status" \
            -H "X-Proxbox-API-Key: ${PROXBOX_API_KEY}")
          echo "$STATUS_JSON"
          export STATUS_JSON
          python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["STATUS_JSON"])
          if "available" in payload:
              ok = bool(payload.get("available"))
          elif "netbox-version" in payload or "django-version" in payload:
              ok = True
          else:
              ok = False

          if not ok:
              raise SystemExit(f"NetBox status check failed: {payload}")
          PY

      - name: Run E2E tests (Docker proxmox mock)
        env:
          PROXBOX_E2E_NETBOX_URL: ${{ matrix.netbox_public_url }}
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXBOX_E2E_NETBOX_TOKEN_VERSION: v1
          PROXMOX_API_MODE: mock
          PROXMOX_MOCK_PUBLISHED_URL: http://localhost:18006
        run: |
          uv run pytest tests/e2e/ -m "not image_http and mock_backend" --tb=short -v

      - name: Run E2E tests with in-process MockBackend
        if: github.ref == 'refs/heads/main'
        env:
          PROXBOX_E2E_NETBOX_URL: ${{ matrix.netbox_public_url }}
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXBOX_E2E_NETBOX_TOKEN_VERSION: v1
          PROXMOX_API_MODE: mock
        run: |
          uv run pytest tests/e2e/ -m "mock_backend" --tb=short -v

      - name: Cleanup
        if: always()
        run: |
          docker rm -f proxbox-e2e netbox-e2e-rqworker netbox-e2e-http netbox-e2e-nginx netbox-e2e-granian proxmox-e2e-mock netbox-e2e-postgres netbox-e2e-redis 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true
