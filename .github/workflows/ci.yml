      needs.test.result == 'success' &&
      needs.docker-images.result == 'success'
    env:
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
