name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-test.txt

      - name: Compile package
        run: python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          python -c "import proxbox_api.main"
          python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: proxbox-api-coverage
          path: coverage.xml

