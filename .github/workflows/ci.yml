name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests --ignore=tests/e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxbox-api-coverage
          path: coverage.xml

  # Pushes runtime (nginx→uvicorn) and mkcert (HTTPS nginx→uvicorn) to Docker Hub.
  docker-images:
    name: Publish Docker images (Hub)
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/testing')
    uses: ./.github/workflows/docker-hub-publish.yml
    secrets: inherit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Serial e2e: NetBox demo is rate- and quota-sensitive; xdist caused flaky site/VM creates.
      - name: Run E2E tests
        run: uv run pytest tests/e2e/ --tb=short -v

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Playwright Trace
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: .playwright/trace/
          retention-days: 7
