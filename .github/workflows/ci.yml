name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          ruff check . &
          ruff format --check . &
          wait

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_openapi.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Core tests
        run: uv run pytest tests/ -v --ignore=tests/e2e --ignore=tests/test_generated_proxmox_routes.py --tb=short

  e2e-docker:
    name: E2E Docker / ${{ matrix.install_source }}
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      !cancelled() &&
      needs.test.result == 'success'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        install_source: [pypi, local]
    env:
      NETBOX_IMAGE: netboxcommunity/netbox:v4.5
      PROXMOX_OPENAPI_IMAGE: emersonfelipesp/proxmox-openapi:latest
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Start E2E stack
        run: |
          set -eux
          docker network create proxbox-e2e || true
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e netbox-e2e-rqworker proxmox-e2e-mock 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          docker pull "${PROXMOX_OPENAPI_IMAGE}"

          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p 18006:8000 \
            -e PROXMOX_API_MODE=mock \
            -e PROXMOX_MOCK_SCHEMA_VERSION=latest \
            "${PROXMOX_OPENAPI_IMAGE}"

          if [ "${{ matrix.install_source }}" = "local" ]; then
            NETBOX_PLUGIN_MOUNT="-v $PWD/../netbox-proxbox:/tmp/netbox-proxbox:ro"
            PLUGIN_INSTALL_SPEC="/tmp/netbox-proxbox"
          else
            NETBOX_PLUGIN_MOUNT=""
            PLUGIN_INSTALL_SPEC="netbox-proxbox"
          fi

          if [ -n "${NETBOX_PLUGIN_MOUNT}" ]; then
            docker run -d --name netbox-e2e --network proxbox-e2e -p 18080:8080 ${NETBOX_PLUGIN_MOUNT} \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "/opt/netbox/venv/bin/pip install --no-cache-dir --upgrade ${PLUGIN_INSTALL_SPEC} && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"
          else
            docker run -d --name netbox-e2e --network proxbox-e2e -p 18080:8080 \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
              -e LOGIN_REQUIRED=False \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "/opt/netbox/venv/bin/pip install --no-cache-dir --upgrade ${PLUGIN_INSTALL_SPEC} && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"
          fi

      - name: Wait for NetBox and create API token
        run: |
          set -eux
          for i in $(seq 1 240); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/ 2>/dev/null || true)"
            if [ "$http_code" -ge 100 ] 2>/dev/null && [ "$http_code" -lt 500 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 240 ]; then
              echo "NetBox did not become ready"
              docker logs netbox-e2e || true
              exit 1
            fi
          done

          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 http://127.0.0.1:18006/api2/json/version >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "proxmox mock did not become ready"
              docker logs proxmox-e2e-mock || true
              exit 1
            fi
          done

          TOKEN_OUTPUT=$(docker exec netbox-e2e /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u=User.objects.get(username='admin'); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          TOKEN_ID=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f1)
          TOKEN_VALUE=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          echo "NETBOX_TOKEN_ID=$TOKEN_ID" >> "$GITHUB_ENV"
          echo "NETBOX_API_TOKEN=$TOKEN_VALUE" >> "$GITHUB_ENV"

      - name: Run E2E tests (Docker proxmox mock)
        env:
          PROXBOX_E2E_NETBOX_URL: http://127.0.0.1:18080
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXMOX_API_MODE: mock
          PROXMOX_MOCK_PUBLISHED_URL: http://localhost:18006
        run: |
          uv run pytest tests/e2e/ -m "not image_http and mock_backend" --tb=short -v

      - name: Run E2E tests with in-process MockBackend
        if: github.ref == 'refs/heads/main'
        env:
          PROXBOX_E2E_NETBOX_URL: http://127.0.0.1:18080
          PROXBOX_E2E_NETBOX_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXMOX_API_MODE: mock
        run: |
          uv run pytest tests/e2e/ -m "mock_backend" --tb=short -v

      - name: Cleanup
        if: always()
        run: |
          docker rm -f netbox-e2e-rqworker netbox-e2e proxmox-e2e-mock netbox-e2e-postgres netbox-e2e-redis 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true
