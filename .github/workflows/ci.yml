name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          ruff check . &
          ruff format --check . &
          wait

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "import proxmox_openapi.mock_main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: uv run pytest -n auto --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests --ignore=tests/e2e --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_prefers_guest_agent_ip --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_falls_back_to_config_when_guest_agent_unavailable --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_skips_guest_agent_call_when_disabled --deselect=tests/test_qemu_guest_agent_sync.py::test_vm_sync_ignore_ipv6_link_local_false_includes_fe80 --deselect=tests/test_individual_sync.py::test_sync_backup_individual_reports_updated_when_backup_exists

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxbox-api-coverage
          path: coverage.xml

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Run cache performance benchmarks
        run: |
          uv run pytest tests/test_session_and_helpers.py -k "cache" -v --tb=short 2>&1 | tee benchmark_cache.log
          echo "Cache benchmark metrics:"
          grep -E "(PASSED|FAILED|test_cache)" benchmark_cache.log || true

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-cache-logs
          path: benchmark_cache.log
          retention-days: 7

  # Publish Docker images only from main branch pushes.
  docker-images:
    name: Publish Docker images (Hub)
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker-hub-publish.yml
    with:
      source_ref: ${{ github.sha }}
      mode: publish
    secrets: inherit

  # Three parallel E2E test jobs: local NetBox demo, HTTP Docker image, HTTPS Docker image.
  # Each uses different mock data to avoid conflicts.
  e2e-demo:
    runs-on: ubuntu-latest
    needs: [test, docker-images]
    if: |
      !cancelled() &&
      needs.test.result == 'success' &&
      (needs.docker-images.result == 'success' || needs.docker-images.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: "E2E — local workspace vs NetBox demo"
        run: uv run pytest tests/e2e/ -m "not image_http" --tb=short -v

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Playwright Trace
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace-demo
          path: .playwright/trace/
          retention-days: 7

  e2e-http:
    runs-on: ubuntu-latest
    needs: [test, docker-images]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !cancelled() &&
      needs.test.result == 'success' &&
      needs.docker-images.result == 'success'
    env:
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: "E2E — published image for current commit (nginx + uvicorn, HTTP)"
        run: |
          set -eux
          IMAGE_REF="emersonfelipesp/proxbox-api:sha-${{ github.sha }}"
          docker pull "$IMAGE_REF"
          docker rm -f proxbox-e2e-http 2>/dev/null || true
          docker run -d --name proxbox-e2e-http \
            -p 127.0.0.1:18080:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            "$IMAGE_REF"
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout http"; docker logs proxbox-e2e-http; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=http://127.0.0.1:18080
          uv run pytest tests/e2e/ -m image_http --tb=short -v
          docker rm -f proxbox-e2e-http

  e2e-https:
    runs-on: ubuntu-latest
    needs: [test, docker-images]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !cancelled() &&
      needs.test.result == 'success' &&
      needs.docker-images.result == 'success'
    env:
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: "E2E — published image for current commit (nginx + HTTPS + uvicorn)"
        run: |
          set -eux
          IMAGE_REF="emersonfelipesp/proxbox-api:sha-${{ github.sha }}-mkcert"
          docker pull "$IMAGE_REF"
          docker rm -f proxbox-e2e-https 2>/dev/null || true
          docker run -d --name proxbox-e2e-https \
            -p 127.0.0.1:18443:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            "$IMAGE_REF"
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18443/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout https"; docker logs proxbox-e2e-https; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=https://127.0.0.1:18443
          export PROXBOX_IMAGE_E2E_TLS_INSECURE=1
          uv run pytest tests/e2e/ -m image_http --tb=short -v
          docker rm -f proxbox-e2e-https
