name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests --ignore=tests/e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxbox-api-coverage
          path: coverage.xml

  # Pushes runtime (nginx→uvicorn) and mkcert (HTTPS nginx→uvicorn) to Docker Hub.
  # Manual runs: Actions → "Docker images" → workflow_dispatch (test-only or publish).
  docker-images:
    name: Publish Docker images (Hub)
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/testing')
    uses: ./.github/workflows/docker-hub-publish.yml
    secrets: inherit

  # Sequential only (no matrix): NetBox demo first, then light HTTP smoke on each image.
  # After docker-images when it runs (main/testing push) so :latest / :latest-mkcert match this commit.
  e2e-sequential:
    name: E2E sequential (local + Docker Hub images)
    runs-on: ubuntu-latest
    needs: [test, docker-images]
    if: |
      !cancelled() &&
      needs.test.result == 'success' &&
      (needs.docker-images.result == 'success' || needs.docker-images.result == 'skipped')
    env:
      IMAGE_NS: emersonfelipesp/proxbox-api
      PROXBOX_SKIP_NETBOX_BOOTSTRAP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra e2e --group dev

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: "E2E (1/3) — local workspace vs NetBox demo"
        run: uv run pytest tests/e2e/ -m "not image_http" --tb=short -v

      - name: "E2E (2/3) — published image latest (nginx + uvicorn, HTTP)"
        run: |
          set -eux
          docker pull "${IMAGE_NS}:latest"
          docker rm -f proxbox-e2e-http 2>/dev/null || true
          docker run -d --name proxbox-e2e-http \
            -p 127.0.0.1:18080:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            "${IMAGE_NS}:latest"
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout http"; docker logs proxbox-e2e-http; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=http://127.0.0.1:18080
          uv run pytest tests/e2e/ -m image_http --tb=short -v
          docker rm -f proxbox-e2e-http

      - name: "E2E (3/3) — published image latest-mkcert (nginx + HTTPS + uvicorn)"
        run: |
          set -eux
          docker pull "${IMAGE_NS}:latest-mkcert"
          docker rm -f proxbox-e2e-https 2>/dev/null || true
          docker run -d --name proxbox-e2e-https \
            -p 127.0.0.1:18443:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            "${IMAGE_NS}:latest-mkcert"
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18443/ >/dev/null 2>&1; then break; fi
            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout https"; docker logs proxbox-e2e-https; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=https://127.0.0.1:18443
          export PROXBOX_IMAGE_E2E_TLS_INSECURE=1
          uv run pytest tests/e2e/ -m image_http --tb=short -v
          docker rm -f proxbox-e2e-https

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Playwright Trace
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: .playwright/trace/
          retention-days: 7
