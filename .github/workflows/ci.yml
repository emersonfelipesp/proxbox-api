      - name: "E2E — published image for current commit (granian + mkcert HTTPS)"
        run: |
          set -eux
          IMAGE_REF="emersonfelipesp/proxbox-api:sha-${{ github.sha }}-granian"
          docker pull "$IMAGE_REF"
          docker rm -f proxbox-e2e-granian 2>/dev/null || true
          docker run -d --name proxbox-e2e-granian \
