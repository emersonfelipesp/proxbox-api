            sleep 2
            if [ "$i" -eq 40 ]; then echo "timeout granian"; docker logs proxbox-e2e-granian; exit 1; fi
          done
          export PROXBOX_IMAGE_E2E_BASE_URL=https://127.0.0.1:18444
          export PROXBOX_IMAGE_E2E_TLS_INSECURE=1
          export PROXMOX_API_MODE=mock
          export PROXMOX_MOCK_PUBLISHED_URL=http://localhost:8006
          export PROXMOX_MOCK_LOCAL_URL=http://localhost:8007
          uv run pytest tests/e2e/ -m image_http --tb=short -v \
