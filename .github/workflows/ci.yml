name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # Matches Dockerfile base; dependency versions come from uv.lock (not the runner image).
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Compile package
        run: uv run python -m compileall proxbox_api scripts tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxbox_api.main"
          uv run python -c "from proxbox_api.proxmox_to_netbox.proxmox_schema import load_proxmox_generated_openapi; assert load_proxmox_generated_openapi().get('paths')"

      - name: Run mocked schema-driven tests
        run: uv run pytest --cov=proxbox_api --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxbox-api-coverage
          path: coverage.xml
