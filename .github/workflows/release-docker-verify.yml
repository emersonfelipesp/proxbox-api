name: Release Docker verification

on:
  release:
    types:
      - published

jobs:
  verify-image:
    name: verify Docker image on release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull release and latest images
        run: |
          REL="${{ github.event.release.tag_name }}"
          TAG="${REL#v}"
          docker pull emersonfelipesp/proxbox-api:"$TAG"
          docker pull emersonfelipesp/proxbox-api:latest
          docker pull emersonfelipesp/proxbox-api:"${TAG}-mkcert"
          docker pull emersonfelipesp/proxbox-api:latest-mkcert

      - name: Smoke-test published startup
        run: |
          set -eux
          REL="${{ github.event.release.tag_name }}"
          TAG="${REL#v}"

          docker rm -f proxbox-release-http 2>/dev/null || true
          docker run -d --name proxbox-release-http \
            -p 127.0.0.1:18080:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            emersonfelipesp/proxbox-api:"$TAG"
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then
              docker rm -f proxbox-release-http
              break
            fi
            sleep 2
            if [ "$i" -eq 40 ]; then
              docker logs proxbox-release-http
              docker rm -f proxbox-release-http
              exit 1
            fi
          done

          docker rm -f proxbox-release-https 2>/dev/null || true
          docker run -d --name proxbox-release-https \
            -p 127.0.0.1:18443:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            emersonfelipesp/proxbox-api:"${TAG}-mkcert"
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18443/ >/dev/null 2>&1; then
              docker rm -f proxbox-release-https
              break
            fi
            sleep 2
            if [ "$i" -eq 40 ]; then
              docker logs proxbox-release-https
              docker rm -f proxbox-release-https
              exit 1
            fi
          done
