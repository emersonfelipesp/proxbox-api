name: Release Docker verification

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v0.0.9.post1)"
        required: true
        type: string

jobs:
  verify-image:
    name: verify Docker images on release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull release and latest images
        run: |
          REL="${{ github.event.release.tag_name || inputs.tag }}"
          TAG="${REL#v}"
          # Verify runs in parallel with publish-testpypi.yml's docker publish
          # step, so retry until images appear (publish chain typically lands
          # within ~30min: TestPyPI → validate → PyPI → docker push).
          pull_with_retry() {
            local image="$1"
            local attempt=0
            local max_attempts=60   # 60 * 60s = 60 minutes
            until docker pull "$image"; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Image $image not available after $max_attempts attempts"
                return 1
              fi
              echo "Image $image not available yet (attempt $attempt/$max_attempts), retrying in 60s..."
              sleep 60
            done
          }
          pull_with_retry emersonfelipesp/proxbox-api:"$TAG"
          pull_with_retry emersonfelipesp/proxbox-api:latest
          pull_with_retry emersonfelipesp/proxbox-api:"${TAG}-nginx"
          pull_with_retry emersonfelipesp/proxbox-api:latest-nginx
          pull_with_retry emersonfelipesp/proxbox-api:"${TAG}-granian"
          pull_with_retry emersonfelipesp/proxbox-api:latest-granian

      - name: Smoke-test published startup
        run: |
          set -eux
          REL="${{ github.event.release.tag_name || inputs.tag }}"
          TAG="${REL#v}"

          # raw (HTTP)
          docker rm -f proxbox-release-raw 2>/dev/null || true
          docker run -d --name proxbox-release-raw \
            -p 127.0.0.1:18080:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            emersonfelipesp/proxbox-api:"$TAG"
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then
              docker rm -f proxbox-release-raw
              break
            fi
            sleep 2
            if [ "$i" -eq 40 ]; then
              docker logs proxbox-release-raw
              docker rm -f proxbox-release-raw
              exit 1
            fi
          done

          # nginx (HTTPS)
          docker rm -f proxbox-release-nginx 2>/dev/null || true
          docker run -d --name proxbox-release-nginx \
            -p 127.0.0.1:18443:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            emersonfelipesp/proxbox-api:"${TAG}-nginx"
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18443/ >/dev/null 2>&1; then
              docker rm -f proxbox-release-nginx
              break
            fi
            sleep 2
            if [ "$i" -eq 40 ]; then
              docker logs proxbox-release-nginx
              docker rm -f proxbox-release-nginx
              exit 1
            fi
          done

          # granian (HTTPS)
          docker rm -f proxbox-release-granian 2>/dev/null || true
          docker run -d --name proxbox-release-granian \
            -p 127.0.0.1:18444:8000 \
            -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=1 \
            emersonfelipesp/proxbox-api:"${TAG}-granian"
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18444/ >/dev/null 2>&1; then
              docker rm -f proxbox-release-granian
              break
            fi
            sleep 2
            if [ "$i" -eq 40 ]; then
              docker logs proxbox-release-granian
              docker rm -f proxbox-release-granian
              exit 1
            fi
          done
