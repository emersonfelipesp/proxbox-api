[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["proxbox_api*"]

[project]
name = "proxbox_api"
version = "0.0.2.post1"
description = "Proxbox API service made using FastAPI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi[standard]>=0.115.6",
    "proxmoxer>=2.2.0",
    "pynetbox>=7.4.1",
    "netbox-sdk>=0.0.6",
    "sqlmodel>=0.0.22",
]

[project.optional-dependencies]
test = [
    "httpx",
    "playwright",
    "pytest",
    "pytest-cov",
]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocs-static-i18n>=1.2.3",
]

[dependency-groups]
dev = [
    "ruff>=0.9",
]

[project.scripts]
proxbox-proxmox-codegen = "proxbox_api.proxmox_codegen.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["proxbox_api"]
branch = true

[tool.coverage.report]
skip_covered = true
show_missing = true

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    "proxbox_api/generated",
    "site",
    "nextjs-ui",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"proxbox_api/main.py" = ["E402"]
"proxbox_api/routes/proxmox/__init__.py" = ["F403", "F405", "E402"]
"proxbox_api/routes/proxmox/cluster.py" = ["F403", "F405"]

[tool.ruff.format]
quote-style = "double"
