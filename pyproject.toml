[project]
name = "proxbox_api"
version = "0.0.2.post1"
description = "Proxbox API service made using FastAPI"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi[standard]>=0.115.6",
    "proxmoxer>=2.2.0",
    "pynetbox>=7.4.1",
    "netbox-sdk==0.0.5",
    "sqlmodel>=0.0.22",
]

[project.optional-dependencies]
test = [
    "httpx",
    "pytest",
    "pytest-cov",
]

[project.scripts]
proxbox-proxmox-codegen = "proxbox_api.proxmox_codegen.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["proxbox_api"]
branch = true

[tool.coverage.report]
skip_covered = true
show_missing = true
