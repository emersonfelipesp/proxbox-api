site_name: proxbox-api
site_description: FastAPI backend for Proxmox and NetBox integration
site_url: https://emersonfelipesp.github.io/proxbox-api/
repo_url: https://github.com/emersonfelipesp/proxbox-api
repo_name: emersonfelipesp/proxbox-api

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Portugues (Brasil)
      link: /pt-BR/
      lang: pt-BR

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: pt-BR
          name: Portugues (Brasil)
          build: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Authentication: getting-started/authentication.md
  - Architecture:
      - Overview: architecture/overview.md
      - Caching: architecture/caching.md
  - API:
      - HTTP Reference: api/http-reference.md
      - Service Routes: api/service-routes.md
      - WebSocket Reference: api/websocket-reference.md
      - Cache API: api/cache.md
      - Cluster HA: api/cluster-ha.md
  - Synchronization:
      - Workflows: sync/workflows.md
      - VM Reconciliation Architecture: sync/reconciliation-architecture.md
      - Name Collision Resolver: sync/name-collision-resolver.md
      - Overwrite Flags: sync/overwrite-flags.md
      - Scheduler Container: sync/scheduler-container.md
  - Operations:
      - Custom Field Recovery: operations/custom-fields.md
      - Hardware Discovery: operations/hardware-discovery.md
      - Firecracker Host-Agent Provisioning: operations/firecracker.md
  - Development:
      - Schema Management: development/schema-management.md
      - Testing: development/testing.md
      - CI and E2E Workflows: development/ci-e2e-workflows.md
      - E2E Proxmox Service Matrix: development/e2e-proxmox-service-matrix.md
      - Deployment: development/deployment.md
      - Release Publishing: development/release-publishing.md
      - Troubleshooting: development/troubleshooting.md
      - Contributing: development/contributing.md
      - Refactoring Summary: development/refactoring-summary.md
      - Sync Fix Summary: development/sync-fix-summary.md
      - Performance & Concurrency:
          - Async Architecture Overview: development/async-overview.md
          - Semaphore-Bounded Concurrency: development/async-semaphores.md
          - Parallel Gather Patterns: development/async-gather.md
          - Two-Phase VM Batch: development/async-two-phase-batch.md
          - Scoped Timeout Widening: development/async-timeout-scoping.md
          - Runtime Concurrency Tunables: development/async-tunables.md
