site_name: proxbox-api
site_description: FastAPI backend for Proxmox and NetBox integration
site_url: https://emersonfelipesp.github.io/proxbox-api/
repo_url: https://github.com/emersonfelipesp/proxbox-api
repo_name: emersonfelipesp/proxbox-api

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Portugues (Brasil)
      link: /pt-BR/
      lang: pt-BR

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: pt-BR
          name: Portugues (Brasil)
          build: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Authentication: getting-started/authentication.md
  - Architecture:
      - Overview: architecture/overview.md
      - Caching: architecture/caching.md
  - API:
      - HTTP Reference: api/http-reference.md
      - WebSocket Reference: api/websocket-reference.md
      - Cache API: api/cache.md
  - Synchronization:
      - Workflows: sync/workflows.md
      - VM Reconciliation Architecture: sync/reconciliation-architecture.md
      - Overwrite Flags: sync/overwrite-flags.md
  - Development:
      - Schema Management: development/schema-management.md
      - Testing: development/testing.md
      - Deployment: development/deployment.md
      - Troubleshooting: development/troubleshooting.md
      - Contributing: development/contributing.md
