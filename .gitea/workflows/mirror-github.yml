name: Mirror selected branches to GitHub

on:
  push:
    branches:
      - develop
      - main

jobs:
  mirror:
    name: Push branch to GitHub
    runs-on: mirror-host
    env:
      GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
      GITEA_SOURCE_TOKEN: ${{ secrets.SOURCE_MIRROR_TOKEN }}
      GITHUB_OWNER: emersonfelipesp

    steps:
      - name: Install GitHub CLI
        shell: bash
        run: |
          set -euo pipefail

          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          if [ "$(uname -s)" != "Linux" ] || ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::GitHub CLI is not installed and this workflow can only install it on Debian/Ubuntu-style Linux runners."
            exit 1
          fi

          sudo_cmd=()
          if [ "$(id -u)" -ne 0 ]; then
            if ! command -v sudo >/dev/null 2>&1; then
              echo "::error::GitHub CLI is missing and sudo is unavailable for installation."
              exit 1
            fi
            sudo_cmd=(sudo -n)
          fi

          "${sudo_cmd[@]}" apt-get update
          "${sudo_cmd[@]}" apt-get install -y ca-certificates curl gnupg
          "${sudo_cmd[@]}" mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | "${sudo_cmd[@]}" tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
          "${sudo_cmd[@]}" chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | "${sudo_cmd[@]}" tee /etc/apt/sources.list.d/github-cli.list >/dev/null
          "${sudo_cmd[@]}" apt-get update
          "${sudo_cmd[@]}" apt-get install -y gh
          gh --version

      - name: Mirror triggering branch
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing required Gitea Actions secret GH_MIRROR_TOKEN."
            exit 1
          fi
          if [ -z "${GITEA_SOURCE_TOKEN:-}" ]; then
            echo "::error::Missing required Gitea Actions secret SOURCE_MIRROR_TOKEN."
            exit 1
          fi

          mirror_branch="${GITHUB_REF_NAME:?}"
          source_repository="${GITHUB_REPOSITORY:?}"

          case "${mirror_branch}" in
            develop|main)
              ;;
            *)
              echo "::error::Ref ${mirror_branch} is not approved for GitHub mirroring."
              exit 1
              ;;
          esac

          repo_name="${source_repository#*/}"
          target_repo="${GITHUB_OWNER}/${repo_name}"
          source_url="https://git.nmulti.cloud/${source_repository}.git"
          worktree="$(mktemp -d)"
          trap 'rm -rf "${worktree}"' EXIT
          export HOME="${worktree}/home"
          mkdir -p "${HOME}"
          gitea_askpass="${worktree}/gitea-askpass.sh"
          cat > "${gitea_askpass}" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) printf '%s\n' x-access-token ;;
            *Password*) printf '%s\n' "${GITEA_SOURCE_TOKEN}" ;;
            *) printf '\n' ;;
          esac
          EOF
          chmod 700 "${gitea_askpass}"

          git init "${worktree}"
          git -C "${worktree}" remote add gitea "${source_url}"
          GIT_ASKPASS="${gitea_askpass}" GIT_TERMINAL_PROMPT=0 \
            git -C "${worktree}" fetch --no-tags gitea "refs/heads/${mirror_branch}"
          git -C "${worktree}" checkout --detach FETCH_HEAD

          gh auth status --hostname github.com
          gh repo view "${target_repo}" --json nameWithOwner --jq '.nameWithOwner'
          gh auth setup-git --hostname github.com --force

          git -C "${worktree}" remote add github "https://github.com/${target_repo}.git"
          if expected_remote_sha="$(git -C "${worktree}" ls-remote github "refs/heads/${mirror_branch}" | awk '{print $1}')" \
            && [ -n "${expected_remote_sha}" ]; then
            git -C "${worktree}" push \
              --force-with-lease="refs/heads/${mirror_branch}:${expected_remote_sha}" \
              github "HEAD:refs/heads/${mirror_branch}"
          else
            git -C "${worktree}" push github "HEAD:refs/heads/${mirror_branch}"
          fi
