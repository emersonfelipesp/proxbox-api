name: Deploy proxbox-api production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to proxbox-api.nmulti.cloud
    runs-on: prod-deploy
    steps:
      - name: Check deploy target
        run: /opt/nmulticloud/deploy/bin/status-app proxbox-api

      - name: Deploy pushed commit
        run: /opt/nmulticloud/deploy/bin/deploy-app proxbox-api "${{ github.sha }}"

      - name: Report deploy target status
        if: always()
        run: /opt/nmulticloud/deploy/bin/status-app proxbox-api
