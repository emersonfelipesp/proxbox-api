name: Deploy proxbox-api (staging/production)

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch or commit SHA)"
        required: false
      environment:
        description: "Target environment (optional for main/develop refs)"
        required: false
        type: choice
        options:
          - staging
          - production
      skip_ci_gate:
        description: "EMERGENCY ONLY: deploy without a green CI result for this SHA (e.g. rolling back to a known-good older commit whose CI status has aged out). Recorded in the run log."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # Gate: the exact SHA about to be deployed must have passed CI.
  #
  # Before this existed, CI and deploy were sibling workflows on the same push
  # event. They raced, deploy never consulted CI, and a red or still-running CI
  # could not stop a production rollout — N-MultiCloud/nmulticloud-context#204
  # requirement 6 ("a parallel workflow on the same push is insufficient").
  #
  # Deliberately implemented as an API poll rather than a `workflow_run` trigger:
  # this Gitea (1.26.2) has known trigger quirks (see CLAUDE.md on tag/dispatch
  # events), and an explicit status check on the *exact* SHA is both portable and
  # easier to audit.
  verify-ci:
    name: Verify CI passed for this SHA
    runs-on: prod-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Require a green CI status for the deployed SHA
        shell: bash
        env:
          # The SHA that will actually be deployed -- not a branch name, so the
          # check cannot drift to a different commit between verification and
          # rollout.
          DEPLOY_SHA: ${{ github.sha }}
          REQUESTED_REF: ${{ inputs.ref }}
          SKIP_CI_GATE: ${{ inputs.skip_ci_gate }}
          REQUIRED_CI_CONTEXT: "CI / Lint, smoke, and core coverage (push)"
          API_BASE: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
          GITEA_API_TOKEN: ${{ secrets.GITEA_TOKEN || github.token }}
          # 90 minutes, not 30. The untrusted CI runner has capacity 1, so a
          # merge commit's CI can sit queued behind another job before it even
          # starts. Observed real durations on this runner (queue + execution):
          # 3, 3, 15, 28 and 44 minutes. A 30-minute budget would have timed out
          # and blocked a legitimate deploy -- failing closed on a false
          # negative. The job only sleeps while waiting, so a generous ceiling
          # costs nothing.
          CI_GATE_TIMEOUT_SECONDS: "5400"
        run: python3 .gitea/scripts/require_ci_status.py

  deploy:
    name: Deploy proxbox-api
    needs: verify-ci
    runs-on: prod-deploy
    env:
      REF: ${{ inputs.ref || github.sha }}
      REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          case "$REF" in
            main | develop | [a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9]*) ;;
            *) echo "ERROR: Invalid ref format: $REF"; exit 1 ;;
          esac

          target="${REQUESTED_ENVIRONMENT:-}"
          if [[ -z "$target" ]]; then
            case "${GITHUB_REF_NAME:-}" in
              develop) target="staging" ;;
              main) target="production" ;;
              *) echo "ERROR: Cannot infer deploy target from ref '${GITHUB_REF_NAME:-}'"; exit 1 ;;
            esac
          fi

          case "$target" in
            staging)
              echo "app=proxbox-api-staging" >> "$GITHUB_OUTPUT"
              echo "url=https://staging.backend.proxbox.nmulti.cloud" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "app=proxbox-api" >> "$GITHUB_OUTPUT"
              echo "url=https://backend.proxbox.nmulti.cloud" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: Invalid deploy target: $target"
              exit 1
              ;;
          esac

      - name: Check deploy target
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/status-app ]]; then
            /opt/nmulticloud/deploy/bin/status-app "${{ steps.target.outputs.app }}"
          else
            ssh nmc-prod-207 -- status "${{ steps.target.outputs.app }}"
          fi

      - name: Deploy pushed commit
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/deploy-app ]]; then
            /opt/nmulticloud/deploy/bin/deploy-app "${{ steps.target.outputs.app }}" "$REF"
          else
            ssh nmc-prod-207 -- deploy "${{ steps.target.outputs.app }}" "$REF"
          fi

      - name: Report deploy target status
        if: always()
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/status-app ]]; then
            /opt/nmulticloud/deploy/bin/status-app "${{ steps.target.outputs.app }}"
          else
            ssh nmc-prod-207 -- status "${{ steps.target.outputs.app }}"
          fi
