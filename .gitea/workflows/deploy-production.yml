name: Deploy proxbox-api production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to proxbox-api.nmulti.cloud
    runs-on: prod-deploy
    steps:
      - name: Check deploy target
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/status-app ]]; then
            /opt/nmulticloud/deploy/bin/status-app proxbox-api
          else
            ssh nmc-prod-207 -- status proxbox-api
          fi

      - name: Deploy pushed commit
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/deploy-app ]]; then
            /opt/nmulticloud/deploy/bin/deploy-app proxbox-api "${{ github.sha }}"
          else
            ssh nmc-prod-207 -- deploy proxbox-api "${{ github.sha }}"
          fi

      - name: Report deploy target status
        if: always()
        shell: bash
        run: |
          if [[ -x /opt/nmulticloud/deploy/bin/status-app ]]; then
            /opt/nmulticloud/deploy/bin/status-app proxbox-api
          else
            ssh nmc-prod-207 -- status proxbox-api
          fi
